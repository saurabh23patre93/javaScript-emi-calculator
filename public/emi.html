<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <style>
        .box {
            background-color: #f2f2f2;
            padding: 30px;
            box-shadow: 6px 2px 3px rgba(0, 0, 0, 0.1);
        }
    </style>
    <script src="../../src/scripts/emi.js" type="text/javascript"></script>

    
</head>

<body class="container-fluid">
    <h1>Personal Loan EMI Calculator</h1>
    <div class="box">
        <div class="row">
            <div class="col-4">
                Amount you need &#8377; <input id="txtAmount" onChange="AmountTextBoxChange()" type="text" size="10">
            </div>
            <div class="col-4">
                For <input id="txtYears" onChange="YearsTextBoxChange()" type="text" size="2"> years
            </div>
            <div class="col-4">
                Interest Rate: <input id="txtInterestRate" onChange="InterestRateTextBoxChange()" type="text" size="4"> %
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-4">
                <div class="d-flex">
                    <span>&#8377; 50,000</span>
                    <input type="range" onChange="AmountChange()" id="rangeAmount" style="width:200px" value="50000" class="form-range" min="50000" max="1000000" step="50000">
                    &#8377; 10,00,000
                </div>
            </div>
            <div class="col-4">
                <div>
                    <span>1</span>
                    <input type="range" onChange="YearsChange()" id="rangeYears" style="width:200px" value="1" class="form-range" min="1" max="5" step="1">
                    <span>5</span>
                </div>
            </div>
            <div class="col-4">
                <div>
                    <span>10.25%</span>
                    <input type="range" onChange="InterestRateChange()" id="rangeInterestRate" style="width:200px" value="10.25" class="form-range" min="10.25" max="20" step="0.01">
                    <span>20%</span>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-4">
                <button onclick="calculateEMI()" class="btn btn-primary">Calculate EMI</button>
            </div>
        </div>  
    </div>
    <p style="font-size: large;" class="mt-4 text-center"  id="emiResult"></p>
</body>

</html>
